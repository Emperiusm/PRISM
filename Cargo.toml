[workspace]
resolver = "2"
members = [
    "crates/prism-protocol",
    "crates/prism-metrics",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "CC0-1.0"

[workspace.dependencies]
bytes = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

prism-protocol = { path = "crates/prism-protocol" }
prism-metrics = { path = "crates/prism-metrics" }
