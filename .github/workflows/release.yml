name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Build release binaries
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release -p prism-server -p prism-client

      - name: Embed admin manifest in server exe
        shell: pwsh
        run: |
          # Create manifest requesting admin elevation (UAC prompt on launch)
          @'
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <assembly xmlns="urn:schemas-microsoft-com:asm.v1" manifestVersion="1.0">
            <trustInfo xmlns="urn:schemas-microsoft-com:asm.v3">
              <security>
                <requestedPrivileges>
                  <requestedExecutionLevel level="requireAdministrator" uiAccess="false"/>
                </requestedPrivileges>
              </security>
            </trustInfo>
          </assembly>
          '@ | Out-File -Encoding utf8 server.manifest
          # Embed manifest into the compiled exe using mt.exe (Windows SDK)
          # mt.exe lives in the Windows SDK bin directory — find it dynamically
          $mt = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "mt.exe" |
                Where-Object { $_.FullName -match "x64" } |
                Sort-Object FullName -Descending |
                Select-Object -First 1 -ExpandProperty FullName
          if ($mt) {
            Write-Host "Found mt.exe at: $mt"
            & $mt -manifest server.manifest "-outputresource:target/release/prism-server.exe;#1"
          } else {
            Write-Warning "mt.exe not found — skipping admin manifest embedding"
          }

      - name: Prepare artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "prism-$version-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item target/release/prism-server.exe $dir/
          Copy-Item target/release/prism-client.exe $dir/
          Copy-Item README.md $dir/
          Copy-Item LICENSE $dir/
          Compress-Archive -Path $dir/* -DestinationPath "$dir.zip"
          echo "ARTIFACT=$dir.zip" >> $env:GITHUB_ENV

      - name: Generate changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"

          # Get commits since previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" "$PREV_TAG..HEAD" -- ':!.github')
          else
            LOG=$(git log --pretty=format:"- %s" -20)
          fi

          cat > changelog.md << 'HEADER'
          ## What's Changed

          HEADER

          echo "$LOG" >> changelog.md

          cat >> changelog.md << FOOTER

          ## Downloads

          | File | Description |
          |------|-------------|
          | \`prism-${VERSION}-windows-x64.zip\` | Server + Client binaries (Windows x64) |

          ### Quick Start

          \`\`\`bash
          # Extract and run
          prism-server.exe --dda          # Start server (real desktop capture)
          prism-client.exe                # Open launcher
          prism-client.exe 192.168.1.100:7000  # Direct connect
          \`\`\`
          FOOTER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: ${{ env.ARTIFACT }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
