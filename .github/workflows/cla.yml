name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
       || github.event_name == 'pull_request_target')
      && github.actor != 'dependabot[bot]'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: main
          allowlist: dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            PRISM is dual-licensed (AGPL-3.0 + Commercial), so we need all contributors to sign the CLA to maintain the ability to offer commercial licenses.

            **To sign**, please comment below with the exact phrase:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to do this once — future PRs will be automatically approved.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          lock-pullrequest-aftermerge: false
